<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <span class="name">TabFlip</span>
    <div class="shortcuts">
      <div class="shortcut-row">
        <span class="keys"><kbd>⌘</kbd> + <kbd>Q</kbd></span>
        <span class="label">quick switch</span>
      </div>
      <div class="shortcut-row">
        <span class="keys"><kbd>⌘</kbd> + <kbd>Q</kbd> <kbd>Q</kbd> <kbd>Q</kbd></span>
        <span class="label">cycle tabs</span>
      </div>
    </div>
    <div class="divider"></div>
    <a href="https://buymeacoffee.com/abidalista" target="_blank" class="coffee">☕ buy me a coffee</a>
  </div>
</body>
</html>
